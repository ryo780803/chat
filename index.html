<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AIгғҒгғЈгғғгғҲ</title>
</head>
<body>

    <input type="text" id="user-input" placeholder="иіӘе•ҸгӮ’е…ҘеҠӣ">
    <button onclick="sendMessage()">йҖҒдҝЎ</button>
    <p id="chat-result">гҒ“гҒ“гҒ«AIгҒ®иҝ”дҝЎгҒҢеҮәгҒҫгҒҷ</p>

    <script>
        // вҳ…гҒ“гҒ“гҒ«GASгҒ®URLгӮ’иІјгӮҠд»ҳгҒ‘гҒҰгҒҸгҒ гҒ•гҒ„вҳ…
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwxv-6cykSgFFk31Q7VZ6VL8BG2MbVogn_nASXNKwnD2wojJmB5LKaSA50djtObezNU0A/exec";

        async function sendMessage() {
            const input = document.getElementById("user-input").value;
            const resultDiv = document.getElementById("chat-result");
            
            resultDiv.innerText = "иҖғгҒҲдёӯ...";

            const response = await fetch(WEB_APP_URL + "?message=" + encodeURIComponent(input));
            const data = await response.json();
            resultDiv.innerText = data.reply;
        }
    </script>
</body>
</html>
